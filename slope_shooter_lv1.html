<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>傾きシューター Lv.1</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Sans", "Meiryo", sans-serif;
    background: #1a1a2e;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 16px; gap: 12px;
  }
  h1 { color: #e0e0ff; font-size: 22px; letter-spacing: 2px; }
  .layout { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
  #stage { background: #f0f6ff; border: 3px solid #6c63ff; border-radius: 10px; display: block; }
  .panel {
    background: #16213e; border: 2px solid #6c63ff; border-radius: 14px;
    padding: 18px; width: 230px; color: #e0e0ff; display: flex; flex-direction: column; gap: 12px;
  }
  .info-row { display: flex; justify-content: space-between; align-items: center; font-size: 15px; }
  .info-val { font-size: 24px; font-weight: bold; color: #ffb84d; }
  #probBar { height: 10px; background: #333; border-radius: 6px; overflow: hidden; margin-top: 4px; }
  #probBarFill { height: 100%; background: linear-gradient(90deg, #6c63ff, #ff7a3d); border-radius: 6px; transition: width 0.1s linear; }
  .sep { border: none; border-top: 1px solid #334; }
  .formula-box {
    background: #0f3460; border-radius: 10px; padding: 10px; text-align: center;
    font-size: 20px; font-weight: bold; color: #fff; letter-spacing: 1px; min-height: 44px;
  }
  .frac-badge { font-size: 12px; color: #1a1a2e; background: #ffd700; border-radius: 6px; padding: 2px 8px; display: none; }
  .choices { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .choice-btn {
    padding: 10px 4px; font-size: 16px; font-weight: bold; border: 2px solid #6c63ff;
    border-radius: 10px; background: #0f3460; color: #e0e0ff; cursor: pointer;
    transition: background 0.15s, transform 0.1s; text-align: center;
  }
  .choice-btn:hover:not(:disabled) { background: #6c63ff; transform: scale(1.05); }
  .choice-btn.selected { background: #6c63ff; border-color: #ffd700; color: #fff; }
  .choice-btn.correct  { background: #27ae60 !important; border-color: #2ecc71 !important; }
  .choice-btn.wrong    { background: #c0392b !important; border-color: #e74c3c !important; }
  .choice-btn:disabled { cursor: default; opacity: 0.85; }
  .shoot-btn {
    width: 100%; padding: 13px; font-size: 18px; font-weight: bold; border: none; border-radius: 10px;
    background: linear-gradient(135deg, #6c63ff, #ff7a3d); color: #fff; cursor: pointer; transition: opacity 0.2s; letter-spacing: 1px;
  }
  .shoot-btn:hover:not(:disabled) { opacity: 0.85; }
  .shoot-btn:disabled { opacity: 0.35; cursor: default; }
  #message { text-align: center; font-size: 20px; font-weight: bold; min-height: 28px; }
  .input-row { display: flex; gap: 6px; align-items: center; }
  .input-row input {
    flex: 1; padding: 8px 10px; font-size: 18px; border: 2px solid #6c63ff; border-radius: 8px;
    background: #0f3460; color: #fff; text-align: center; outline: none;
  }
  .input-row input:focus { border-color: #ffd700; }
  .hint { font-size: 11px; color: #888; text-align: center; }
  .mode-toggle { display: flex; gap: 6px; }
  .mode-btn {
    flex: 1; padding: 6px; font-size: 12px; font-weight: bold; border: 2px solid #6c63ff;
    border-radius: 8px; background: #0f3460; color: #aaa; cursor: pointer;
  }
  .mode-btn.active { background: #6c63ff; color: #fff; }
  #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.78); display: flex; align-items: center; justify-content: center; z-index: 10; }
  .overlay-box { background: #16213e; border: 3px solid #6c63ff; border-radius: 16px; padding: 34px 38px; text-align: center; color: #e0e0ff; max-width: 350px; width: 90%; }
  .overlay-box h2 { font-size: 26px; margin-bottom: 10px; color: #ffb84d; }
  .overlay-box p  { font-size: 15px; color: #aaa; margin-bottom: 16px; line-height: 1.7; }
  .big-score { font-size: 52px; font-weight: bold; color: #fff; margin: 8px 0 6px; }
  .big-score small { font-size: 22px; color: #aaa; }
  .overlay-btn { padding: 14px 34px; font-size: 18px; font-weight: bold; border: none; border-radius: 10px; background: linear-gradient(135deg, #6c63ff, #ff7a3d); color: #fff; cursor: pointer; letter-spacing: 1px; margin-top: 12px; }
  .overlay-btn:hover { opacity: 0.85; }
</style>
</head>
<body>

<h1>🎯 傾きシューター Lv.1</h1>

<div class="layout">
  <canvas id="stage" width="480" height="480"></canvas>

  <div class="panel">
    <div>
      <div class="info-row">
        <span>⏱ この問題</span>
        <span class="info-val" id="timeDisp">10</span>
      </div>
      <div id="probBar"><div id="probBarFill" style="width:100%"></div></div>
    </div>

    <div class="info-row">
      <span>問題</span>
      <span><b id="probNum">1</b> / 10</span>
    </div>
    <div class="info-row">
      <span>💯 得点</span>
      <span class="info-val" id="score">0</span>
    </div>

    <hr class="sep">

    <div class="formula-box" id="formulaBox">y = ? × x</div>
    <div class="frac-badge" id="fracBadge">🔸 分数の傾き！</div>

    <div class="mode-toggle">
      <button class="mode-btn active" id="modeChoice" onclick="setMode('choice')">6択</button>
      <button class="mode-btn"        id="modeInput"  onclick="setMode('input')">キーボード</button>
    </div>

    <div id="choicesArea" class="choices"></div>

    <div id="inputArea" style="display:none;">
      <div class="input-row">
        <span style="font-size:18px;">a =</span>
        <input type="text" id="slopeInput" placeholder="例: 2 や 1/2">
      </div>
      <div class="hint">分数は「1/2」のように入力</div>
    </div>

    <button class="shoot-btn" id="shootBtn" disabled>🚀 発射！</button>
    <div id="message"></div>
  </div>
</div>

<div id="overlay">
  <div class="overlay-box" id="overlayBox">
    <h2>🎯 傾きシューター</h2>
    <p>
      直線 <b>y = ax</b> で的をねらえ！<br>
      的の座標から傾き a を考えて選ぼう<br><br>
      ⏱ <b>1問10秒</b>・全<b>10問</b><br>
      1問正解で<b>10点</b>（100点満点）<br>
      最後の2問は<b>分数の傾き</b>だよ
    </p>
    <button class="overlay-btn" onclick="startGame()">▶ スタート</button>
  </div>
</div>

<script>
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const SCALE = 22;
const cx = W / 2, cy = H / 2;
function toSX(x){ return cx + x * SCALE; }
function toSY(y){ return cy - y * SCALE; }

const TOTAL = 10;
const PROBLEM_TIME = 10;
const HIT_DIST = 0.45; // 命中の許容（正解の値のときだけ当たる）

const INT_SLOPES = [-4, -3, -2, -1, 1, 2, 3, 4];
const FRAC_SLOPES = [
  {num:1,den:2}, {num:1,den:3}, {num:2,den:3},
  {num:-1,den:2}, {num:-1,den:3}, {num:-2,den:3}
];

let state = 'idle';
let problemIndex = 0;
let score = 0;
let problemTimer = PROBLEM_TIME;
let lastTime = null, rafId = null;
let target = null;
let correctSlope = null;   // {val,label}
let selectedSlope = null;  // {val,label}
let beam = null;
let shotFired = false;
let resolving = false;
let inputMode = 'choice';

const shootBtn   = document.getElementById('shootBtn');
const messageEl  = document.getElementById('message');
const scoreEl    = document.getElementById('score');
const probNumEl  = document.getElementById('probNum');
const timeDispEl = document.getElementById('timeDisp');
const probFill   = document.getElementById('probBarFill');
const formulaBox = document.getElementById('formulaBox');
const fracBadge  = document.getElementById('fracBadge');
const choicesArea= document.getElementById('choicesArea');
const inputArea  = document.getElementById('inputArea');
const slopeInput = document.getElementById('slopeInput');
const overlay    = document.getElementById('overlay');

function makeInt(v){ return {val:v, label:String(v)}; }
function makeFrac(f){ return {val:f.num/f.den, label:`${f.num}/${f.den}`, den:f.den, num:f.num}; }

function setMode(mode){
  inputMode = mode;
  document.getElementById('modeChoice').classList.toggle('active', mode==='choice');
  document.getElementById('modeInput').classList.toggle('active', mode==='input');
  choicesArea.style.display = mode==='choice' ? 'grid' : 'none';
  inputArea.style.display   = mode==='input'  ? 'block' : 'none';
  selectedSlope = null;
  if(!shotFired) shootBtn.disabled = true;
}

function parseInput(str){
  str = (str||'').trim();
  if(!str) return null;
  if(str.includes('/')){
    const p = str.split('/');
    const n = parseFloat(p[0]), d = parseFloat(p[1]);
    if(!isNaN(n) && !isNaN(d) && d !== 0) return n/d;
    return null;
  }
  const v = parseFloat(str);
  return isNaN(v) ? null : v;
}

function newProblem(){
  const isFrac = problemIndex >= 8;
  resolving = false;
  shotFired = false;
  beam = null;
  problemTimer = PROBLEM_TIME;

  let pool;
  if(isFrac){
    correctSlope = makeFrac(FRAC_SLOPES[Math.floor(Math.random()*FRAC_SLOPES.length)]);
    pool = FRAC_SLOPES.map(makeFrac);
    // 的：|tx| = 2×分母 にして命中判定を明確にする
    const k = Math.random() < 0.5 ? -2 : 2;
    const tx = correctSlope.den * k;
    const ty = correctSlope.num * k;
    target = { x: tx, y: ty, hit: false };
  } else {
    const v = INT_SLOPES[Math.floor(Math.random()*INT_SLOPES.length)];
    correctSlope = makeInt(v);
    pool = INT_SLOPES.map(makeInt);
    let tx, ty;
    do {
      tx = Math.floor(Math.random()*9) - 4; // -4〜4
      ty = v * tx;
    } while (tx === 0 || Math.abs(ty) > 9);
    target = { x: tx, y: ty, hit: false };
  }

  fracBadge.style.display = isFrac ? 'inline-block' : 'none';
  formulaBox.textContent = 'y = ? × x';
  probNumEl.textContent = problemIndex + 1;
  buildChoices(pool);
  selectedSlope = null;
  shootBtn.disabled = true;
  slopeInput.value = '';
  messageEl.textContent = '';
}

function buildChoices(pool){
  const others = pool.filter(p => p.val !== correctSlope.val);
  for(let i=others.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [others[i],others[j]]=[others[j],others[i]]; }
  const choices = [correctSlope, ...others.slice(0,5)];
  for(let i=choices.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [choices[i],choices[j]]=[choices[j],choices[i]]; }

  choicesArea.innerHTML = '';
  choices.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = p.label;
    btn.dataset.val = p.val;
    btn.onclick = () => selectChoice(p, btn);
    choicesArea.appendChild(btn);
  });
}

function selectChoice(p, btn){
  if(shotFired) return;
  selectedSlope = p;
  choicesArea.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  formulaBox.textContent = 'y = ' + p.label + ' × x';
  shootBtn.disabled = false;
}

slopeInput.addEventListener('input', () => {
  if(shotFired) return;
  const v = parseInput(slopeInput.value);
  if(v !== null){
    selectedSlope = { val: v, label: slopeInput.value.trim() };
    formulaBox.textContent = 'y = ' + selectedSlope.label + ' × x';
    shootBtn.disabled = false;
  } else {
    selectedSlope = null;
    shootBtn.disabled = true;
  }
});

function drawGrid(){
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle = '#cfe0f7'; ctx.lineWidth = 1;
  for(let i=-11;i<=11;i++){
    ctx.beginPath(); ctx.moveTo(toSX(i),0); ctx.lineTo(toSX(i),H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,toSY(i)); ctx.lineTo(W,toSY(i)); ctx.stroke();
  }
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(0,cy); ctx.lineTo(W,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,H); ctx.stroke();
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.moveTo(W-4,cy); ctx.lineTo(W-14,cy-6); ctx.lineTo(W-14,cy+6); ctx.fill();
  ctx.beginPath(); ctx.moveTo(cx,4); ctx.lineTo(cx-6,14); ctx.lineTo(cx+6,14); ctx.fill();
  ctx.fillStyle = '#666'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  for(let i=-10;i<=10;i+=2){ if(i===0) continue; ctx.fillText(i, toSX(i), cy+15); }
  ctx.textAlign = 'left';
  for(let i=-10;i<=10;i+=2){ if(i===0) continue; ctx.fillText(i, cx+4, toSY(i)+4); }
  ctx.fillStyle = '#555'; ctx.font = 'bold 14px sans-serif';
  ctx.fillText('x', W-10, cy-8); ctx.fillText('y', cx+8, 12);
}

function drawPreviewLine(){
  if(selectedSlope === null) return;
  ctx.save();
  ctx.strokeStyle = 'rgba(108,99,255,0.35)'; ctx.lineWidth = 2; ctx.setLineDash([7,6]);
  ctx.beginPath();
  ctx.moveTo(toSX(-11), toSY(selectedSlope.val * -11));
  ctx.lineTo(toSX(11),  toSY(selectedSlope.val * 11));
  ctx.stroke();
  ctx.restore();
}

function drawCannon(slope){
  const angle = -Math.atan(slope);
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.fillStyle = '#7a5fd0';
  ctx.beginPath(); ctx.roundRect(12,-8,16,16,3); ctx.fill();
  ctx.fillStyle = '#9b7ede';
  ctx.beginPath(); ctx.roundRect(-16,-16,32,32,7); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath(); ctx.roundRect(-11,-12,22,8,4); ctx.fill();
  ctx.restore();
}

function drawUFO(t){
  const sx = toSX(t.x), sy = toSY(t.y);
  const r = 0.5 * SCALE;
  ctx.save();
  ctx.translate(sx, sy);
  ctx.fillStyle = t.hit ? '#2ecc71' : '#a8324a';
  ctx.beginPath(); ctx.ellipse(0,0,r*1.9,r*0.45,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = t.hit ? '#1a7a44' : '#1a1a40';
  ctx.beginPath(); ctx.ellipse(0,0,r*0.95,r*0.85,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.beginPath(); ctx.ellipse(-r*0.25,-r*0.32,r*0.3,r*0.18,-0.3,0,Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#333'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(`(${t.x}, ${t.y})`, sx + r*1.9 + 6, sy - 4);
}

function drawBeam(){
  if(!beam) return;
  ctx.beginPath();
  ctx.moveTo(toSX(0), toSY(0));
  ctx.lineTo(toSX(beam.cx), toSY(beam.cy));
  ctx.strokeStyle = '#ff7a3d'; ctx.lineWidth = 4; ctx.stroke();
  ctx.beginPath(); ctx.arc(toSX(beam.cx), toSY(beam.cy), 8, 0, Math.PI*2);
  ctx.fillStyle = '#ffd54a'; ctx.fill();
}

function drawScene(){
  drawGrid();
  if(state !== 'playing') return;
  drawPreviewLine();
  if(target) drawUFO(target);
  drawBeam();
  drawCannon(selectedSlope !== null ? selectedSlope.val : 0);
}

function shoot(){
  if(state !== 'playing' || beam || shotFired) return;
  if(selectedSlope === null) return;
  const a = selectedSlope.val;
  const dir = target.x >= 0 ? 1 : -1;
  beam = { a, cx: 0, cy: 0, dir, speed: 0.16 };
  shotFired = true;
  shootBtn.disabled = true;
  if(inputMode === 'choice'){
    choicesArea.querySelectorAll('.choice-btn').forEach(b => {
      b.disabled = true;
      const v = parseFloat(b.dataset.val);
      if(Math.abs(v - correctSlope.val) < 1e-6) b.classList.add('correct');
      else if(selectedSlope && Math.abs(v - selectedSlope.val) < 1e-6) b.classList.add('wrong');
    });
  }
}

function updateBeam(){
  if(!beam) return;
  beam.cx += beam.dir * beam.speed;
  beam.cy = beam.a * beam.cx;
  const dist = Math.hypot(beam.cx - target.x, beam.cy - target.y);
  if(dist < HIT_DIST){
    target.hit = true;
    score += 10; scoreEl.textContent = score;
    messageEl.textContent = '🎉 命中！ +10点';
    messageEl.style.color = '#2ecc71';
    beam = null;
    drawScene();
    scheduleNext(1000);
    return;
  }
  if(Math.abs(beam.cx) > 11 || Math.abs(beam.cy) > 11){
    messageEl.textContent = '😢 ハズレ… 正解は a=' + correctSlope.label;
    messageEl.style.color = '#ff6b6b';
    beam = null;
    drawScene();
    scheduleNext(1200);
    return;
  }
}

function scheduleNext(delay){
  if(resolving) return;
  resolving = true;
  setTimeout(advance, delay);
}

function advance(){
  problemIndex++;
  if(problemIndex >= TOTAL){ endGame(); return; }
  newProblem();
  drawScene();
}

function gameLoop(ts){
  if(state !== 'playing') return;
  if(!lastTime) lastTime = ts;
  const dt = (ts - lastTime) / 1000;
  lastTime = ts;

  if(!shotFired && !resolving){
    problemTimer -= dt;
    if(problemTimer <= 0){
      problemTimer = 0;
      shotFired = true;
      messageEl.textContent = '⏰ 時間切れ！ 正解は a=' + correctSlope.label;
      messageEl.style.color = '#ffb84d';
      scheduleNext(1200);
    }
  }

  timeDispEl.textContent = Math.ceil(Math.max(problemTimer,0));
  probFill.style.width = (Math.max(problemTimer,0) / PROBLEM_TIME * 100) + '%';

  updateBeam();
  drawScene();
  rafId = requestAnimationFrame(gameLoop);
}

function startGame(){
  overlay.style.display = 'none';
  state = 'playing';
  problemIndex = 0;
  score = 0;
  scoreEl.textContent = '0';
  lastTime = null;
  newProblem();
  drawScene();
  rafId = requestAnimationFrame(gameLoop);
}

function endGame(){
  state = 'gameover';
  if(rafId) cancelAnimationFrame(rafId);
  let rank;
  if(score >= 100)      rank = '🏆 パーフェクト！天才！';
  else if(score >= 70)  rank = '🥇 すばらしい！';
  else if(score >= 40)  rank = '🥈 よくできました！';
  else                  rank = '🥉 もう一度チャレンジ！';
  document.getElementById('overlayBox').innerHTML = `
    <h2>🎉 ゲーム終了！</h2>
    <p>${rank}</p>
    <div class="big-score">${score}<small> / 100点</small></div>
    <button class="overlay-btn" onclick="startGame()">🔄 もう一度</button>
  `;
  overlay.style.display = 'flex';
}

shootBtn.addEventListener('click', shoot);
drawGrid();
</script>
</body>
</html>
